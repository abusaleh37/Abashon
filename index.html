<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background-color: #121212; color: #fff; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: #1a1a1a; }
        .hero { text-align: center; padding: 150px 20px; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('YOUR_BACKGROUND_IMAGE_URL'); background-size: cover; background-position: center; }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        .btn-group { margin-top: 20px; }
        .btn { padding: 10px 25px; border-radius: 5px; text-decoration: none; margin: 5px; font-weight: bold; }
        .btn-gold { background: #d4af37; color: #000; }
        .btn-outline { border: 1px solid #fff; color: #fff; }
        .portfolio { padding: 50px; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .gallery img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 24px; font-weight: bold;">Abashon</div>
    <div>
        <a href="#" style="color:white; text-decoration:none; margin: 0 15px;">প্রজেক্ট</a>
        <a href="#" style="color:white; text-decoration:none; margin: 0 15px;">সেবা</a>
        <a href="#" style="color:white; text-decoration:none; margin: 0 15px;">আমাদের সম্পর্কে</a>
        <a href="#" class="btn btn-gold">যোগাযোগ করুন</a>
    </div>
</nav>

<div class="hero">
    <h1>আপনার স্বপ্নের ভিত্তি</h1>
    <p>আমরা আধুনিক প্রযুক্তি দিয়ে আপনার স্বপ্নকে বাস্তবে রূপান্তর করি।</p>
    <div class="btn-group">
        <a href="#" class="btn btn-gold">আমাদের সেবা</a>
        <a href="#" class="btn btn-outline">আরও দেখুন</a>
    </div>
</div>

<div class="portfolio">
    <h2>আমাদের পোর্টফোলিও</h2>
    <div class="gallery">
        <img src="YOUR_IMAGE_URL_1" alt="Project 1">
        <img src="YOUR_IMAGE_URL_2" alt="Project 2">
        <img src="YOUR_IMAGE_URL_3" alt="Project 3">
    </div>
</div>

</body>
</html>
