<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abashon Construction Firm</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            background-color: #1a1a1a; 
            color: white; 
        }
        
        /* Navbar Style */
        nav { 
            display: flex; 
            justify-content: space-between; 
            padding: 20px 50px; 
            align-items: center; 
        }
        .logo { 
            font-size: 24px; 
            font-weight: bold; 
        }
        .nav-links a { 
            color: white; 
            text-decoration: none; 
            margin-left: 20px; 
        }
        .btn-contact { 
            background: #d4af37; 
            padding: 10px 20px; 
            border-radius: 5px; 
            color: black; 
            font-weight: bold; 
        }

        /* Hero Section */
        .hero { 
            height: 70vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('YOUR_BACKGROUND_IMAGE_URL');
            background-size: cover;
            background-position: center;
        }
        .hero h1 { 
            font-size: 50px; 
            margin-bottom: 10px; 
        }

        /* Portfolio Section */
        .portfolio { 
            padding: 50px; 
        }
        .gallery { 
            display: flex; 
            gap: 20px; 
            justify-content: center; 
        }
        .gallery img { 
            width: 300px; 
            height: 200px; 
            border-radius: 10px; 
            object-fit: cover; 
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Abashon</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Services</a>
            <a href="#">Projects</a>
            <a href="#" class="btn-contact">Contact Us</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Foundation of Your Dreams</h1>
        <p>We transform your dreams into reality using superior construction technology.</p>
    </div>

    <div class="portfolio">
        <h2>Our Portfolio</h2>
        <div class="gallery">
            <img src="YOUR_IMAGE_URL_1" alt="Project 1">
            <img src="YOUR_IMAGE_URL_2" alt="Project 2">
            <img src="YOUR_IMAGE_URL_3" alt="Project 3">
        </div>
    </div>
<script>
    let index = 0;
    const images = document.querySelectorAll('.gallery img');

    function slide() {
        images.forEach(img => img.style.display = 'none');
        index = (index + 1) % images.length;
        images[index].style.display = 'block';
    }

    // Initialize: hide all but the first image
    images.forEach((img, i) => i !== 0 ? img.style.display = 'none' : null);
    setInterval(slide, 3000); 
</script>
</body>
</html>
