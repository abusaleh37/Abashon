<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abashon Construction</title>
    <style>
        /* CSS Design - sob kisu ekhanei ache */
        body { margin: 0; font-family: 'Arial', sans-serif; background-color: #121212; color: #fff; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: #1a1a1a; }
        .logo { font-size: 24px; font-weight: bold; color: #d4af37; }
        .nav-links a { color: white; text-decoration: none; margin: 0 15px; font-size: 16px; }
        .btn-gold { background: #d4af37; padding: 10px 20px; color: black; text-decoration: none; border-radius: 5px; font-weight: bold; }

        /* Hero Section */
        .hero { text-align: center; padding: 150px 20px; 
                background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://github.com/abusaleh37/Abashon/blob/main/pexels-marviio-15641049.jpg?raw=true'); 
                background-size: cover; background-position: center; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; }
        .hero p { font-size: 1.2rem; margin-bottom: 30px; }

        /* Portfolio Section */
        .portfolio { padding: 50px 20px; background-color: #1a1a1a; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .gallery img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; border: 2px solid #d4af37; }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .gallery { grid-template-columns: 1fr; }
            .hero h1 { font-size: 2rem; }
        }
        @media (max-width: 600px) {
        nav {
            flex-direction: column;
            text-align: center;
        }
        .nav-links {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    }
    </style>
</head>
<body>

<nav>
    <div class="logo">ABASHON consultancy & construction</div>
    <div class="nav-links">
        <a href="#">প্রজেক্ট</a>
        <a href="#">সেবা</a>
        <a href="#">আমাদের সম্পর্কে</a>
        <a href="#" class="btn-gold">যোগাযোগ করুন</a>
    </div>
</nav>

<div class="hero">
    <h1>আপনার স্বপ্নের ভিত্তি</h1>
    <p>আমরা আধুনিক প্রযুক্তি দিয়ে আপনার স্বপ্নকে বাস্তবে রূপান্তর করি।</p>
    <a href="#" class="btn-gold">আমাদের সেবা</a>
</div>

<div class="portfolio">
    <h2 style="text-align:center; margin-bottom: 40px;">আমাদের পোর্টফোলিও</h2>
    <div class="gallery">
        <img src="https://github.com/abusaleh37/Abashon/blob/main/pexels-eneszn-11615246.jpg?raw=true" alt="Project 1">
        <img src="YOUR_IMAGE_LINK_2" alt="Project 2">
        <img src="YOUR_IMAGE_LINK_3" alt="Project 3">
    </div>
</div>

</body>
</html>
