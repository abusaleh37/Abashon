<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abashon Construction</title>
    <style>
        /* General Reset */
        body { margin: 0; font-family: 'Arial', sans-serif; color: #fff; }

        /* Hero & Portfolio Section eksathe full screen background */
        .hero-portfolio-wrapper {
            position: relative;
            min-height: 100vh; /* Full viewport height */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* Background image setup */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://github.com/abusaleh37/Abashon/blob/main/pexels-marviio-15641049.jpg?raw=true');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Optional: background stationary on scroll */
        }

        /* Hero Text Content */
        .hero-content { text-align: center; margin-bottom: 60px; }
        .hero-content h1 { font-size: 3rem; margin-bottom: 10px; }
        .hero-content p { font-size: 1.2rem; margin-bottom: 25px; max-width: 600px; margin-left: auto; margin-right: auto; }

        /* Gold Button */
        .btn-gold { background: #d4af37; padding: 10px 20px; color: black; text-decoration: none; border-radius: 5px; font-weight: bold; }

        /* Portfolio/Project Section */
        .portfolio-section { text-align: center; width: 100%; max-width: 1200px; }
        .portfolio-section h2 { font-size: 2rem; margin-bottom: 40px; text-transform: uppercase; }
        
        /* Gallery - 3 Columns */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        /* Transparent Project Boxes */
        .project-box {
            /* Glassmorphism effect for transparency */
            /* Transparent Project Boxes */
    .project-box {
        /* আগের কোডগুলো এখানে থাকবে */
        background: rgba(255, 255, 255, 0.1); 
        backdrop-filter: blur(10px); 
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 15px;
        padding: 20px;
        transition: transform 0.3s ease, background 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;

        /* নতুন এই ৩টি লাইন যোগ করুন */
        width: 100%;
        max-width: 300px;
        margin: 0 auto;
    }

    /* ইমেজের জন্য আলাদা এই অংশটুকু বক্সের নিচে যোগ করুন */
    .project-box img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 10px;
    }
    }
            background: rgba(255, 255, 255, 0.1); /* Semi-transparent white */
            backdrop-filter: blur(10px); /* Blur the background behind the box */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s ease, background 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .project-box:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2); /* Slightly more opaque on hover */
        }

        .project-box img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .project-box h3 { margin: 0; font-size: 1.2rem; color: #fff; }
        .project-box p { margin: 5px 0 0; font-size: 0.9rem; color: #ddd; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .gallery { grid-template-columns: 1fr; gap: 20px; }
            .hero-content h1 { font-size: 2rem; }
            .hero-portfolio-wrapper { padding: 50px 15px; }
        }
    </style>
</head>
<body>

<!-- Ei wrapper ti background image-ke dhore rakhbe r sob content-ke majhkhan e rakhbe -->
<div class="hero-portfolio-wrapper">
    
    <!-- Hero Text Content -->
    <div class="hero-content">
        <h1>আপনার স্বপ্নের ভিত্তি</h1>
        <p>আমরা আধুনিক প্রযুক্তি দিয়ে আপনার স্বপ্নকে বাস্তবে রূপান্তর করি।</p>
        <a href="#" class="btn-gold">আমাদের সেবা</a>
    </div>

    <!-- Portfolio/Project Section -->
    <div class="portfolio-section">
        <h2>আমাদের পোর্টফোলিও</h2>
        <div class="gallery">
            
            <!-- Project 1 -->
            <div class="project-box">
                <img src="YOUR_PROJECT_1_IMAGE_URL" alt="Project 1">
                <h3>প্রোজেক্ট ১</h3>
                <p>আধুনিক অ্যাপার্টমেন্ট কমপ্লেক্স</p>
            </div>

            <!-- Project 2 -->
            <div class="project-box">
                <img src="YOUR_PROJECT_2_IMAGE_URL" alt="Project 2">
                <h3>প্রোজেক্ট ২</h3>
                <p>কমার্শিয়াল টাওয়ার</p>
            </div>

            <!-- Project 3 -->
            <div class="project-box">
                <img src="YOUR_PROJECT_3_IMAGE_URL" alt="Project 3">
                <h3>প্রোজেক্ট ৩</h3>
                <p>রেসিডেন্সিয়াল এরিয়া</p>
            </div>

        </div>
    </div>

</div>

</body>
</html>
