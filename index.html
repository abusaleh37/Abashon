<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Abashon - Official Website</title>
    <style>
    body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; text-align: center; background-color: #f0f2f5; }
    header { background: #2c3e50; color: #fff; padding: 2rem; }
    .grid-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 30px;
        padding: 50px;
    }
    .card { 
        background: linear-gradient(145deg, #6c5ce7, #a29bfe); 
        color: white;
        padding: 40px 20px; 
        border-radius: 15px; 
        font-size: 1.2rem;
        font-weight: bold;
        box-shadow: 10px 10px 20px #bebebe, -10px -10px 20px #ffffff;
        transition: transform 0.3s;
    }
    .card:hover { transform: scale(1.05); }
    footer { background: #2c3e50; color: #fff; padding: 15px; position: fixed; bottom: 0; width: 100%; }
</style>
</head>
<body>
    <header>
        <h1>Welcome to ABASHON Consultancy & Construction</h1>
    </header>

    <div class="grid-container">
        <div class="card"><h3>Running Projects</h3></div>
        <div class="card"><h3>Previous Projects</h3></div>
        <div class="card"><h3>Contact Me</h3></div>
        <a href="login.html" style="text-decoration:none; color:white;"><div class="card"><h3>Employee Login</h3></div></a>
    </div>

    <footer>
        <p>&copy; 2026 Abashon. All rights reserved.</p>
    </footer>
</body>
</html>
