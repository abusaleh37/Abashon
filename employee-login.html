<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login - Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center p-4">
    
    <div class="w-full max-w-md">
        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-indigo-600 to-blue-600 px-8 py-8">
                <h1 class="text-2xl font-bold text-white mb-2">Employee Login</h1>
                <p class="text-indigo-100 text-sm">Restricted access for authorized staff only</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="p-8 space-y-5" novalidate>
                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">
                        Email Address
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="your.email@company.com"
                        autocomplete="username"
                        required
                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition text-slate-900 placeholder-slate-400"
                    >
                </div>

                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition text-slate-900 placeholder-slate-400"
                    >
                </div>

                <!-- Error Message -->
                <div id="errorAlert" class="hidden bg-red-50 border border-red-200 rounded-lg p-3">
                    <p id="errorText" class="text-sm text-red-700 font-medium"></p>
                </div>

                <!-- Success Message -->
                <div id="successAlert" class="hidden bg-green-50 border border-green-200 rounded-lg p-3">
                    <p class="text-sm text-green-700 font-medium">Login successful! Redirecting...</p>
                </div>

                <!-- Submit Button -->
                <button
                    type="submit"
                    id="submitBtn"
                    class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-semibold py-2.5 rounded-lg hover:shadow-lg hover:from-indigo-700 hover:to-blue-700 transition duration-200 ease-in-out flex items-center justify-center gap-2"
               c
                    <span id="btnText">Sign In</span>
                    <span id="spinner" class="hidden">
                        <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                </button>
            </form>

            <!-- Footer -->
            <div class="bg-slate-50 px-8 py-4 border-t border-slate-200 text-center">
                <p class="text-xs text-slate-500">
                    Contact your administrator if you need access or have forgotten your password.
                </p>
            </div>
        </div>

        <!-- Info Box -->
        <div class="mt-6 bg-blue-50 border border-blue-200 rounded-lg p-4">
            <p class="text-xs text-blue-700">
                <strong>Demo:</strong> Use <code class="bg-white px-1 py-0.5 rounded">demo@company.com</code> / <code class="bg-white px-1 py-0.5 rounded">password123</code> to test
            </p>
        </div>
    </div>

    <script>
        /**
         * ============================================================
         * EMPLOYEE LOGIN SYSTEM
         * ============================================================
         * 
         * SECURITY NOTICE:
         * This is a CLIENT-SIDE ONLY authentication system. For 
         * maximum security, pair this with a backend server that
         * validates credentials. Current implementation is suitable
         * for:
         *   ✓ Internal portals (low-security)
         *   ✓ Keeping casual visitors out
         *   ✓ Basic access control
         * 
         * NOT suitable for:
         *   ✗ Protecting sensitive data
         *   ✗ Financial/medical information
         *   ✗ Compliance-critical systems
         * 
         * Passwords are SHA-256 hashed but stored in client-side code.
         * Anyone can inspect the source to see hashes.
         * ============================================================
         */

        // Approved employee credentials
        // Format: { email: "user@company.com", passwordHash: "sha256hash" }
        const APPROVED_EMPLOYEES = [
            {
                email: "demo@company.com",
                passwordHash: "ef92b778bafe771e89245d171bafcd62f1d98747686b2500583e4043826ea3735" // sha256("password123")
            },
            // Add more employees here:
            // {
            //     email: "jane.doe@company.com",
            //     passwordHash: "your_hashed_password_here"
            // }
        ];

        // OPTIONAL: Replace hardcoded list with Google Sheet endpoint
        // Set to your Google Apps Script Web App URL to fetch credentials dynamically
        // Expected format: returns JSON array with { email, passwordHash }
        const GOOGLE_SHEET_ENDPOINT = "";
        // Example: "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec"

        /**
         * SHA-256 hash function using Web Crypto API
         */
        async function sha256(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        /**
         * Fetch credentials from Google Sheet (if configured)
         * Falls back to hardcoded list if endpoint is not set or fails
         */
        async function getCredentials() {
            if (!GOOGLE_SHEET_ENDPOINT) {
                return APPROVED_EMPLOYEES;
            }

            try {
                const response = await fetch(GOOGLE_SHEET_ENDPOINT, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache'
                });

                if (!response.ok) {
                    console.warn('Google Sheet request failed, using fallback credentials');
                    return APPROVED_EMPLOYEES;
                }

                const data = await response.json();
                return Array.isArray(data) ? data : APPROVED_EMPLOYEES;
            } catch (error) {
                console.warn('Error fetching from Google Sheet:', error);
                return APPROVED_EMPLOYEES;
            }
        }

        /**
         * Show error message
         */
        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorAlert.classList.remove('hidden');
        }

        /**
         * Hide error message
         */
        function hideError() {
            document.getElementById('errorAlert').classList.add('hidden');
        }

        /**
         * Show loading state
         */
        function setLoading(isLoading) {
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');

            if (isLoading) {
                submitBtn.disabled = true;
                btnText.textContent = 'Signing in...';
                spinner.classList.remove('hidden');
            } else {
                submitBtn.disabled = false;
                btnText.textContent = 'Sign In';
                spinner.classList.add('hidden');
            }
        }

        /**
         * Handle form submission
         */
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            // Validate input
            if (!email || !password) {
                showError('Please enter both email and password.');
                return;
            }

            setLoading(true);

            try {
                // Get credentials from source (hardcoded or Google Sheet)
                const credentials = await getCredentials();

                // Hash the entered password
                const passwordHash = await sha256(password);

                // Find matching employee
                const employee = credentials.find(emp =>
                    emp.email.toLowerCase() === email && emp.passwordHash === passwordHash
                );

                if (employee) {
                    // Successful login!
                    document.getElementById('errorAlert').classList.add('hidden');
                    document.getElementById('successAlert').classList.remove('hidden');

                    // Store authentication in sessionStorage
                    // Using sessionStorage means auth is lost when the browser/tab closes
                    // Use localStorage if you want persistent sessions (less secure on shared devices)
                    sessionStorage.setItem('employeeAuth', 'true');
                    sessionStorage.setItem('employeeEmail', email);
                    sessionStorage.setItem('employeeLoginTime', new Date().toISOString());

                    // Redirect to dashboard after a brief delay
                    setTimeout(() => {
                        window.location.href = 'employee-dashboard.html';
                    }, 1000);
                } else {
                    // Login failed
                    showError('Invalid email or password. Please try again.');
                    document.getElementById('password').value = '';
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('An error occurred. Please try again.');
            } finally {
                setLoading(false);
            }
        });

        // Helper function: to add a new employee, run this in browser console
        // Replace "newpassword" with their actual password
        window.hashPassword = async function(password) {
            const hash = await sha256(password);
            console.log('Add this to APPROVED_EMPLOYEES:');
            console.log(`{ email: "user@company.com", passwordHash: "${hash}" }`);
            return hash;
        };
    </script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", function(event) {
      event.preventDefault();
      window.location.href = "employee-dashboard.html";
    });
  </script>
</body>
</html>
