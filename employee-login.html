<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login - Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center p-4">
    
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-indigo-600 to-blue-600 px-8 py-8">
                <h1 class="text-2xl font-bold text-white mb-2">Employee Login</h1>
                <p class="text-indigo-100 text-sm">Restricted access for authorized staff only</p>
            </div>

            <form id="loginForm" class="p-8 space-y-5" novalidate>
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your.email@company.com" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                
                <div id="errorAlert" class="hidden bg-red-50 border border-red-200 rounded-lg p-3">
                    <p id="errorText" class="text-sm text-red-700"></p>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-semibold py-2.5 rounded-lg hover:bg-indigo-700 transition">
                    <span id="btnText">Sign In</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        // আপনার ডেমো ক্রেডেনশিয়াল
        const APPROVED_EMPLOYEES = [
            {
                email: "demo@company.com",
                passwordHash: "ef92b778bafe771e89245d171bafcd62f1d98747686b2500583e4043826ea3735" 
            }
        ];

        // লগইন লজিক
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            // পাসওয়ার্ড হ্যাশ ফাংশন (সহজ ভার্সন)
            async function checkLogin() {
                const encoder = new TextEncoder();
                const data = encoder.encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

                const user = APPROVED_EMPLOYEES.find(emp => emp.email === email && emp.passwordHash === hashHex);

                if (user) {
                    window.location.href = "employee-dashboard.html";
                } else {
                    alert("Invalid Email or Password");
                }
            }

            checkLogin();
        });
    </script>
</body>
</html>
